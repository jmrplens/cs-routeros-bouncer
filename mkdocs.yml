site_name: cs-routeros-bouncer
site_url: https://jmrplens.github.io/cs-routeros-bouncer/
site_description: CrowdSec remediation component (bouncer) for MikroTik RouterOS
site_author: jmrplens
repo_url: https://github.com/jmrplens/cs-routeros-bouncer
repo_name: jmrplens/cs-routeros-bouncer
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025 jmrplens — MIT License

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jmrplens
      name: jmrplens on GitHub
  generator: false

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - Router Setup: getting-started/router-setup.md
  - Configuration:
      - Overview: configuration/index.md
      - CrowdSec: configuration/crowdsec.md
      - MikroTik: configuration/mikrotik.md
      - Firewall: configuration/firewall.md
      - Logging & Metrics: configuration/logging-metrics.md
      - Examples: configuration/examples.md
  - How It Works:
      - Architecture: architecture/index.md
      - Firewall Rules: architecture/firewall-rules.md
      - Decision Processing: architecture/decisions.md
      - State Reconciliation: architecture/reconciliation.md
  - Monitoring:
      - Prometheus Metrics: monitoring/prometheus.md
      - Grafana Dashboard: monitoring/grafana.md
      - Health Endpoint: monitoring/health.md
  - Troubleshooting: troubleshooting.md
  - Development:
      - Contributing: development/contributing.md
      - Building & Testing: development/building.md
      - Project Structure: development/structure.md
      - Security: development/security.md
