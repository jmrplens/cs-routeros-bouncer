version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gocritic
    - revive
    - bodyclose
    - noctx
    - gosec
    - prealloc
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: var-naming
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
    gosec:
      excludes:
        - G104
        - G101
        - G117
    misspell:
      locale: US
      extra-words:
        - typo: routeros
          correction: routeros
        - typo: ROUTEROS
          correction: ROUTEROS

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - linters:
        - prealloc
      path: internal/routeros/
