name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: "What problem does this feature solve? Why is it needed?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How would you like this to work?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Have you considered any alternative solutions or workarounds?"

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: "Which part of the bouncer does this relate to?"
      options:
        - Firewall rules management
        - Address list management
        - CrowdSec integration
        - RouterOS API
        - Configuration
        - Metrics / Monitoring
        - Docker / Packaging
        - Documentation
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Any other relevant information, examples, or references"
