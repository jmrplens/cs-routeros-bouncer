name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I have searched [existing issues](https://github.com/jmrplens/cs-routeros-bouncer/issues?q=is%3Aissue) and this feature has not been requested.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or feature.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Firewall rules management
        - Address list management
        - CrowdSec integration
        - RouterOS API
        - Configuration
        - Metrics / Monitoring
        - Docker / Packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: Use cases
      description: How would this feature be used? Provide concrete examples.
      placeholder: |
        1.
        2.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches were considered and why were they rejected?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, related issues, links to RouterOS or CrowdSec docs, etc.
