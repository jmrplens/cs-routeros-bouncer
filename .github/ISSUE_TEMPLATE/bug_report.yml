name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug.

        For security vulnerabilities, do not use this form. Please use [GitHub Security Advisories](https://github.com/jmrplens/cs-routeros-bouncer/security/advisories/new).

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      description: Please confirm before submitting.
      options:
        - label: I have searched [existing issues](https://github.com/jmrplens/cs-routeros-bouncer/issues?q=is%3Aissue) and this bug has not been reported.
          required: true
        - label: I have read the [README](https://github.com/jmrplens/cs-routeros-bouncer#readme) and [troubleshooting guide](https://jmrplens.github.io/cs-routeros-bouncer/troubleshooting/).
          required: true

  - type: input
    id: version
    attributes:
      label: Bouncer version
      description: Output of `cs-routeros-bouncer --version` or Docker image tag.
      placeholder: "v1.4.4"
    validations:
      required: true

  - type: input
    id: routeros-version
    attributes:
      label: RouterOS version
      description: MikroTik RouterOS version.
      placeholder: "7.22.1"
    validations:
      required: true

  - type: input
    id: routeros-model
    attributes:
      label: Router model
      description: MikroTik router model.
      placeholder: "RB5009UG+S+"

  - type: input
    id: crowdsec-version
    attributes:
      label: CrowdSec version
      description: Output of `cscli version`.
      placeholder: "1.7.7"

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Docker / Docker Compose
        - Binary (systemd)
        - Binary (manual)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant config only. Redact API keys, passwords, tokens, and router credentials.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: "Paste relevant logs. Use `logging.level: debug` if possible."
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, metrics, router CPU observations, related issues, etc.
