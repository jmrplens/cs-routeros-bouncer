name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: v1.7.12
  GOLANGCI_LINT_VERSION: v2.12.2
  GO_VERSION: "1.26.3"
  GOSEC_VERSION: latest
  GOTOOLCHAIN: go1.26.3
  MODERNIZE_VERSION: latest
  STATICCHECK_VERSION: v0.7.0

jobs:
  workflows:
    name: GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install actionlint
        run: go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
      - name: Lint GitHub workflows
        run: actionlint

  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Lint Markdown
        run: npx --yes markdownlint-cli2 "**/*.md"

  go-format:
    name: Go formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: Check gofmt
        run: |
          issues=$(gofmt -l -s cmd internal tests)
          if [ -n "$issues" ]; then
            echo "Files needing gofmt:"
            echo "$issues"
            exit 1
          fi
      - name: Check goimports
        run: |
          issues=$(goimports -local github.com/jmrplens/cs-routeros-bouncer -l cmd internal tests)
          if [ -n "$issues" ]; then
            echo "Files needing goimports:"
            echo "$issues"
            exit 1
          fi

  go-analysis:
    name: Go analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Install modernize
        run: go install "golang.org/x/tools/go/analysis/passes/modernize/cmd/modernize@${MODERNIZE_VERSION}"
      - name: Install golangci-lint
        run: go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
      - name: Install gosec
        run: go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
      - name: Install Staticcheck
        run: go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"
      - name: Run go vet
        run: go vet ./cmd/... ./internal/...
      - name: Run modernize
        run: modernize ./cmd/... ./internal/...
      - name: Run golangci-lint
        run: golangci-lint run ./cmd/... ./internal/...
      - name: Run gosec
        run: gosec -quiet -severity medium -confidence medium -exclude-generated -fmt text ./cmd/... ./internal/...
      - name: Run Staticcheck
        run: staticcheck ./cmd/... ./internal/...

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./cmd/... ./internal/...

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck on functional tests
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: tests/functional
          additional_files: tests/functional/lib/helpers.sh
        env:
          SHELLCHECK_OPTS: -x

  docs:
    name: Astro docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install documentation dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Analyze documentation
        working-directory: docs
        run: pnpm analyze

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Run tests with race detector and coverage
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    env:
      SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: coverage
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8
        continue-on-error: true
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [go-analysis, shellcheck, vulncheck, test, docs, workflows, markdown]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build -trimpath -buildmode=pie \
            -ldflags "-s -w -X github.com/jmrplens/cs-routeros-bouncer/internal/config.Version=${{ github.sha }}" \
            -o bin/cs-routeros-bouncer-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/cs-routeros-bouncer/
      - uses: actions/upload-artifact@v7
        with:
          name: cs-routeros-bouncer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
          retention-days: 1

  docker:
    name: Docker
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t cs-routeros-bouncer:ci-test .
      - name: Verify image
        run: docker run --rm cs-routeros-bouncer:ci-test --help
