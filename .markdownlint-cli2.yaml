# markdownlint-cli2 configuration
# Same lint rules as .markdownlint-cli2.jsonc.

config:
  default: true
  MD013: false
  MD010: false
  MD024: false
  MD025: false
  MD033: false
  MD041: false
  MD046: false
  MD060: false

ignores:
  - "**/*.mdx"
  - "**/node_modules/**"
  - "**/dist/**"
  - "site/**"
  - "plan/**"
  - "vendor/**"
  - local/**

noProgress: true
