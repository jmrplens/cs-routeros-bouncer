# cs-routeros-bouncer configuration
# All options can also be set via environment variables (see README.md).
# String values may reference environment variables with ${VAR} placeholders.
# Only braced placeholders are expanded; literal $ characters are preserved.

# ──────────────────────────────────────────────────────────────────────────────
# Basic parameters — the essential settings to get the bouncer running.
# Most deployments only need to adjust these values.
# ──────────────────────────────────────────────────────────────────────────────

crowdsec:
  # CrowdSec LAPI URL
  api_url: "http://localhost:8080/"
  # Bouncer API key (register with: cscli bouncers add cs-routeros-bouncer)
  api_key: ""
  # How often to poll LAPI for decision updates
  # ────────────────────────────────────────────────────────────────────────────
  # Advanced CrowdSec parameters (defaults work for most setups)
  # ────────────────────────────────────────────────────────────────────────────
  update_frequency: "10s"
  # How often to repair drift between active CrowdSec decisions and RouterOS
  # address lists (0 to disable, minimum non-zero value: 1m)
  reconciliation_interval: "15m"
  # Filter decisions by origin (empty = all decisions)
  # Use ["crowdsec", "cscli"] for local-only mode (no community blocklists)
  # If set via CROWDSEC_ORIGINS, use a space-separated value: "crowdsec cscli".
  origins: []
  # Include only decisions whose scenario contains one of these strings
  scenarios_containing: []
  # Exclude decisions whose scenario contains one of these strings
  scenarios_not_containing: []
  # Filter decisions by scope
  scopes: ["ip", "range"]
  # Only process these decision types
  supported_decisions_types: ["ban"]
  # Retry connecting to LAPI on startup failure
  retry_initial_connect: true
  # Interval for reporting usage metrics to LAPI (0 to disable)
  lapi_metrics_interval: "15m"
  # TLS authentication (optional)
  # cert_path: "/etc/cs-routeros-bouncer/tls/cert.pem"
  # key_path: "/etc/cs-routeros-bouncer/tls/key.pem"
  # ca_cert_path: "/etc/cs-routeros-bouncer/tls/ca.pem"
  # insecure_skip_verify: false

mikrotik:
  # RouterOS API address (host:port)
  address: "192.168.0.1:8728"
  # API username (create a dedicated user with minimal permissions)
  username: "crowdsec"
  # API password
  password: ""
  # Use TLS (port 8729)
  # ────────────────────────────────────────────────────────────────────────────
  # Advanced MikroTik parameters (defaults work for most setups)
  # ────────────────────────────────────────────────────────────────────────────
  tls: false
  # Skip TLS certificate verification
  tls_insecure: false
  # Connection timeout
  connection_timeout: "10s"
  # Command execution timeout
  command_timeout: "30s"
  # Number of parallel API connections for bulk operations (1-20, default: 4).
  # At startup the bouncer queries the router's API max-sessions and caps this
  # value automatically so it never exceeds the router limit.
  pool_size: 4

firewall:
  ipv4:
    enabled: true
    # Name of the IPv4 address list in MikroTik
    address_list: "crowdsec-banned"
    # Optional IPv4-only placement override. Inherits unspecified fields from
    # firewall.rule_placement. You can also add IPv4-only filter/raw overrides.
    # rule_placement:
    #   strategy: "before_comment"
    #   comment: "IPv4 production anchor"
    #   raw:
    #     strategy: "position"
    #     position: 4
  ipv6:
    enabled: true
    # Name of the IPv6 address list in MikroTik
    address_list: "crowdsec6-banned"
    # Optional IPv6-only placement override. Inherits unspecified fields from
    # firewall.rule_placement. You can also add IPv6-only filter/raw overrides.
    # rule_placement: "bottom"
  filter:
    # Create filter firewall rules
    enabled: true
    # Chains where filter rules are created
    chains: ["input"]
    # ──────────────────────────────────────────────────────────────────────────
    # Advanced filter parameters (defaults work for most setups)
    # ──────────────────────────────────────────────────────────────────────────
    # Override the global log_prefix for filter rules only (empty = use global)
    # log_prefix: ""
    # Add connection-state matcher to filter rules (not available for raw).
    # Restricts rule matching to specific connection states.
    # Examples: "new" (only new connections), "new,invalid" (new + invalid).
    # Valid states: established, related, new, invalid, untracked.
    # Empty = no connection-state filter (matches all traffic).
    # connection_state: ""
  raw:
    # Create raw firewall rules (prerouting — blocks before connection tracking)
    enabled: true
    # Chains where raw rules are created
    chains: ["prerouting"]
    # ──────────────────────────────────────────────────────────────────────────
    # Advanced raw parameters (defaults work for most setups)
    # ──────────────────────────────────────────────────────────────────────────
    # Override the global log_prefix for raw rules only (empty = use global)
    # log_prefix: ""
  # Action for firewall rules: "drop" or "reject"
  deny_action: "drop"
  # ────────────────────────────────────────────────────────────────────────────
  # Advanced Firewall parameters (defaults work for most setups)
  # ────────────────────────────────────────────────────────────────────────────
  # When deny_action is "reject", customize the reject response type.
  # Valid values: icmp-network-unreachable, icmp-host-unreachable,
  # icmp-port-unreachable, icmp-protocol-unreachable, icmp-network-prohibited,
  # icmp-host-prohibited, icmp-admin-prohibited, tcp-reset.
  # Empty = RouterOS default behavior.
  # reject_with: ""
  block_output:
    # Block outgoing traffic to banned IPs (disabled by default)
    enabled: false
    # WAN interface for output rules (required if block_output enabled)
    # interface: "ether1"
    # Or use an interface list instead
    # interface_list: "WAN"
    # Override the global log_prefix for output rules only (empty = use global)
    # log_prefix: ""
    # Allow a specific local client IP to bypass output blocking (per protocol).
    # Uses src-address negation (!IP) on the output rule.
    # passthrough_v4: ""
    # passthrough_v6: ""
    # Or use an address-list instead (takes precedence over single IP).
    # Uses src-address-list negation (!list) on the output rule.
    # passthrough_v4_list: ""
    # passthrough_v6_list: ""
  block_input:
    # Restrict input/prerouting rules to specific interface(s).
    # When both are empty (default), rules apply to ALL interfaces.
    # Use this to limit blocking to the WAN interface only, allowing
    # LAN traffic from banned IPs to still reach the router (e.g. for
    # management or internal services).
    # interface: "ether1"
    # interface_list: "WAN"
    # Whitelist address-list: create an accept rule before the drop/reject rule
    # for traffic coming from IPs in this list. Useful for allowing trusted
    # sources even when their IPs appear in CrowdSec ban lists.
    # whitelist: ""
  # Where to place new rules. Simple values: "top" (most secure) or "bottom".
  # Advanced placement can target an absolute RouterOS position or a rule comment:
  # rule_placement:
  #   strategy: "after_comment" # top, bottom, before_comment, after_comment, position
  #   comment: "drop invalid"
  #   comment_match: "contains" # exact or contains
  #   fallback: "top" # only for comment strategies
  #   # For numeric placement:
  #   # strategy: "position"
  #   # position: 2 # required for position; zero-based RouterOS print position; out-of-range appends
  #   filter:
  #     strategy: "after_comment"
  #     comment: "drop invalid"
  #   raw:
  #     strategy: "top"
  rule_placement: "top"
  # Comment prefix used to identify bouncer-managed resources in MikroTik
  comment_prefix: "crowdsec-bouncer"
  # Enable logging on firewall rules (logs matched packets in RouterOS log)
  log: false
  # Prefix for RouterOS log entries when log is enabled
  log_prefix: "crowdsec-bouncer"

logging:
  # Log level: debug, info, warn, error
  level: "info"
  # ────────────────────────────────────────────────────────────────────────────
  # Advanced Logging parameters (defaults work for most setups)
  # ────────────────────────────────────────────────────────────────────────────
  # Log format: text (human-readable) or json (structured)
  format: "text"
  # Log to file (optional, empty = stdout only)
  # file: "/var/log/cs-routeros-bouncer.log"

metrics:
  # ────────────────────────────────────────────────────────────────────────────
  # Advanced Metrics parameters (defaults work for most setups)
  # ────────────────────────────────────────────────────────────────────────────
  # Enable Prometheus metrics endpoint
  enabled: false
  # Listen address for metrics server
  listen_addr: "0.0.0.0"
  # Listen port for metrics server
  listen_port: 2112
  # Interval for polling RouterOS system metrics (CPU, memory, temperature)
  # Set to 0 to disable system metrics collection
  routeros_poll_interval: "30s"
  # Track processed (non-blocked) traffic with passthrough counting rules.
  # Set to false to avoid creating those extra counter rules.
  track_processed: true
