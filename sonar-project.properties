# SonarCloud configuration for cs-routeros-bouncer.

sonar.projectKey=jmrplens_cs-routeros-bouncer
sonar.organization=jmrplens
sonar.projectName=cs-routeros-bouncer

# Source and test directories
sonar.sources=cmd,internal,docs/src
sonar.tests=internal
sonar.test.inclusions=**/*_test.go

# Coverage report generated by CI
sonar.go.coverage.reportPaths=coverage.out

# CLI entry points and generated/static documentation assets are validated by
# integration and build workflows rather than unit coverage.
sonar.coverage.exclusions=cmd/**/main.go,docs/**
sonar.exclusions=go.mod,docs/dist/**,site/**,bin/**,local/**

# Go test names commonly use underscores for table/scenario variants.
sonar.issue.ignore.multicriteria=t1,t2,t3,g1,g2,j1

sonar.issue.ignore.multicriteria.t1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.t1.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.t2.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.t2.resourceKey=**/*_test.go

sonar.issue.ignore.multicriteria.t3.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.t3.resourceKey=**/*_test.go

# TODO/FIXME comments are allowed as project tracking markers.
sonar.issue.ignore.multicriteria.g1.ruleKey=go:S1135
sonar.issue.ignore.multicriteria.g1.resourceKey=**/*.go

# RouterOS command maps and option builders intentionally keep local string
# literals close to the API calls they configure.
sonar.issue.ignore.multicriteria.g2.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.g2.resourceKey=internal/routeros/**/*.go

# S4036 (PATH-based command lookup): docs/src/lib/latest-release.mjs invokes
# `git` at build time only (static-site build in dev/CI environments where
# PATH is trusted); it never runs in the shipped site or the Go binary. The
# same pattern already exists in docs/astro.config.mjs, outside sonar.sources.
sonar.issue.ignore.multicriteria.j1.ruleKey=javascript:S4036
sonar.issue.ignore.multicriteria.j1.resourceKey=docs/src/lib/**/*.mjs
